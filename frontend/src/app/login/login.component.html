<div class="scene">
  <!-- Fond énergie : aurora dérivante (l'identité de la marque, en mouvement) -->
  <div class="aurora a1"></div>
  <div class="aurora a2"></div>
  <div class="aurora a3"></div>
  <div class="grid-bg"></div>

  <div class="card" [class.shake]="shake()">
    <div class="brand">
      <span class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg>
      </span>
      <h1>EnergySense</h1>
      <p class="tag">Supervision énergétique CVC en temps réel</p>
    </div>

    <form (ngSubmit)="login()" class="form">
      <label class="field">
        <span class="lbl">Email</span>
        <span class="input" [class.focus]="focus()==='email'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          <input type="email" name="email" [(ngModel)]="email" required autocomplete="username"
                 placeholder="admin@energysense.io"
                 (focus)="focus.set('email')" (blur)="focus.set(null)">
        </span>
      </label>

      <label class="field">
        <span class="lbl">Mot de passe</span>
        <span class="input" [class.focus]="focus()==='pwd'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
          <input [type]="show() ? 'text' : 'password'" name="password" [(ngModel)]="password" required autocomplete="current-password"
                 placeholder="••••••••"
                 (focus)="focus.set('pwd')" (blur)="focus.set(null)">
          <button type="button" class="eye" (click)="show.set(!show())" aria-label="Afficher le mot de passe">
            @if (show()) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 12s4-7 10-7a9.7 9.7 0 0 1 5 1.4M22 12s-4 7-10 7a9.7 9.7 0 0 1-5-1.4"/><path d="m4 4 16 16"/></svg>
            }
          </button>
        </span>
      </label>

      @if (error()) {
        <div class="err">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
          {{ error() }}
        </div>
      }

      <button type="submit" class="submit" [disabled]="loading()">
        @if (loading()) { <span class="spinner"></span> Connexion… }
        @else { Se connecter <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg> }
      </button>
    </form>

    <p class="foot">Plateforme cloud-native · Kubernetes · MQTT</p>
  </div>
</div>
