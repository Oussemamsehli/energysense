<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-icon">⚡</span>
      <h1>EnergySense</h1>
      <p>Plateforme de monitoring HVAC/IoT</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="admin@energysense.com" (keyup.enter)="login()" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="login()" />
      </div>
      <p class="error" *ngIf="error">{{ error }}</p>
      <button class="btn-login" (click)="login()" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </div>
  </div>
</div>
