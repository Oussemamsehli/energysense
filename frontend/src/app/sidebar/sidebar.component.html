<aside class="sidebar">

  <!-- Brand -->
  <div class="brand">
    <svg class="brand-logo" viewBox="0 0 24 24" fill="currentColor">
      <path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/>
    </svg>
    <span class="brand-name">EnergySense</span>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="9" rx="1.2"/><rect x="14" y="3" width="7" height="5" rx="1.2"/><rect x="14" y="12" width="7" height="9" rx="1.2"/><rect x="3" y="16" width="7" height="5" rx="1.2"/>
      </svg>
      <span>Dashboard</span>
    </a>

    <a routerLink="/sites" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 21h18M6 21V5a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v16M18 21V11l-4-2"/><path d="M9 8h2M9 12h2M9 16h2"/>
      </svg>
      <span>Sites</span>
    </a>

    <a routerLink="/sensors" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="6" width="12" height="12" rx="2"/><rect x="9" y="9" width="6" height="6" rx="1"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/>
      </svg>
      <span>Capteurs</span>
    </a>

    <a routerLink="/alerts" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/>
      </svg>
      <span>Alertes</span>
    </a>
  </nav>

  <!-- Footer : utilisateur + déconnexion -->
  <div class="footer">
    <div class="user">
      <div class="avatar">A</div>
      <div class="user-info">
        <span class="user-name">Admin</span>
        <span class="user-role">Administrator</span>
      </div>
    </div>
    <button type="button" class="logout" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
      <span>Déconnexion</span>
    </button>
  </div>

</aside>
