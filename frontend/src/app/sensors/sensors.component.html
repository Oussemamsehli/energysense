<div class="page">
  <header class="head">
    <div>
      <h1 class="title">Capteurs <span class="live-tag"><span class="pip"></span>temps réel</span></h1>
      <p class="sub">{{ filtered().length }} capteurs · mise à jour toutes les 2,5 s</p>
    </div>
    <button type="button" class="btn-refresh" (click)="refresh()" [class.spin]="spinning()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
      Rafraîchir
    </button>
  </header>

  <div class="filters">
    <button class="pill" [class.on]="type()==='all'" (click)="type.set('all')">Tous</button>
    <button class="pill" [class.on]="type()==='temp'" (click)="type.set('temp')">Température</button>
    <button class="pill" [class.on]="type()==='humidity'" (click)="type.set('humidity')">Humidité</button>
    <button class="pill" [class.on]="type()==='power'" (click)="type.set('power')">Puissance</button>
  </div>

  <div class="grid">
    @for (s of filtered(); track s.id) {
      <app-sensor-card [sensor]="s"></app-sensor-card>
    } @empty {
      <div class="empty"><p>Aucun capteur de ce type</p></div>
    }
  </div>
</div>
