<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>⚡</span><span>EnergySense</span></div>
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">Dashboard</a>
      <a routerLink="/sites" routerLinkActive="active" class="nav-item">Sites</a>
      <a routerLink="/alerts" routerLinkActive="active" class="nav-item">Alertes</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" (click)="logout()">Déconnexion</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div>
        <h1>Sites</h1>
        <p class="topbar-sub">{{ sites.length }} site(s) enregistré(s)</p>
      </div>
      <button class="btn-primary" (click)="showForm = !showForm">+ Nouveau site</button>
    </div>

    <div class="create-form" *ngIf="showForm">
      <h3>Nouveau site</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Nom du site</label>
          <input type="text" [(ngModel)]="newName" placeholder="Ex: Site Tunis Nord" />
        </div>
        <div class="form-group">
          <label>Localisation</label>
          <input type="text" [(ngModel)]="newLocation" placeholder="Ex: Tunis" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" (click)="showForm = false">Annuler</button>
        <button class="btn-primary" (click)="createSite()" [disabled]="saving">
          {{ saving ? 'Création...' : 'Créer le site' }}
        </button>
      </div>
    </div>

    <div class="sites-grid" *ngIf="!loading">
      <div class="site-card" *ngFor="let site of sites">
        <div class="site-card-header">
          <div class="site-avatar">{{ site.name[0] }}</div>
          <div>
            <div class="site-name">{{ site.name }}</div>
            <div class="site-loc">📍 {{ site.location }}</div>
          </div>
          <span class="status-badge ok">En ligne</span>
        </div>
        <div class="site-stats">
          <div class="stat"><div class="stat-val">—</div><div class="stat-label">Capteurs</div></div>
          <div class="stat"><div class="stat-val">—</div><div class="stat-label">Alertes</div></div>
          <div class="stat"><div class="stat-val">—</div><div class="stat-label">kWh</div></div>
        </div>
      </div>
    </div>
    <div class="loading-state" *ngIf="loading">Chargement...</div>
    <div class="empty-state" *ngIf="!loading && sites.length === 0">
      Aucun site. Créez votre premier site.
    </div>
  </main>
</div>
