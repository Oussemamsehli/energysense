services:
  postgres:
    image: postgres:16
    container_name: energysense-postgres
    environment:
      POSTGRES_DB: energysense
      POSTGRES_USER: energysense
      POSTGRES_PASSWORD: energysense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: energysense-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config

volumes:
  postgres_data:
