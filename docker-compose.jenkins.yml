services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: energysense-jenkins
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    networks:
      - energysense-ci

  sonarqube:
    image: sonarqube:community
    container_name: energysense-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - energysense-ci

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_logs:

networks:
  energysense-ci:
    driver: bridge